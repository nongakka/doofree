<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <title>หรรมน้อย ออนไลน์</title>
  <script src="https://cdn.tailwindcss.com"></script>

  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
</head>

<body class="bg-gray-900 text-white p-4">

  <!-- 🔥 HEADER FIXED -->
<div class="sticky top-0 z-50 bg-gray-900/95 backdrop-blur border-b border-white/10">

  <!-- 🔥 แถวบน -->
  <div class="flex items-center justify-between px-2 py-2">

    <button onclick="goBack()"
      class="group flex items-center gap-2 px-4 py-2 rounded-xl
      bg-gradient-to-r from-indigo-500/80 to-blue-600/80
      text-white text-sm font-semibold shadow-lg">
      <span class="transition-transform group-hover:-translate-x-1">⬅</span>
      <span>หน้าหลัก</span>
    </button>

    <h1 class="text-xl text-center flex-1">
      ⚽ หรรมน้อย ออนไลน์ ⚽
    </h1>

    <div class="w-[90px]"></div>
  </div>

  <!-- 🔥 แถบลีก -->
  <div id="leagueBar"
    class="flex gap-4 overflow-x-auto px-2 pb-2">
  </div>

</div> <!-- ✅ ปิด header ตรงนี้ -->

<!-- 🔥 แมตช์ -->
<div id="matches"
  class="grid md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4 mt-4">
</div>

  
<style>
.active-server {
  box-shadow: 0 0 10px #3b82f6;
  transform: scale(1.05);
}
/* 🔥 เอฟเฟกต์ลีก */
.league-item {
  transition: all 0.25s ease;
}

.league-item:hover {
  transform: translateY(-3px) scale(1.05);
}

.league-active {
  transform: scale(1.1);
}

.league-active .league-box {
  background: linear-gradient(135deg, #6366f1, #3b82f6);
  box-shadow: 0 0 15px rgba(59,130,246,0.6);
}

.league-active img {
  filter: drop-shadow(0 0 6px rgba(255,255,255,0.7));
}


  
</style>
<script>
let selectedLeague = null;
let leaguesMap = {};
let PLAYLIST = [];

async function loadPlaylist() {
  try {
    const res = await fetch("https://raw.githubusercontent.com/nongakka/shortmovie/main/playlist.json");
    PLAYLIST = await res.json();
    console.log("✅ โหลด playlist แล้ว", PLAYLIST.length);
  } catch (e) {
    console.error("❌ โหลด playlist ไม่ได้", e);
  }
}

function normalize(str) {
  return (str || "")
    .toLowerCase()
    .replace(/[^a-z0-9]/g, "");
}

function findStream(channelName) {
  if (!channelName || PLAYLIST.length === 0) return null;

  const cleanChannel = normalize(channelName);

  return PLAYLIST.find(p => {
    const cleanTitle = normalize(p.title);
    return cleanTitle.includes(cleanChannel) || cleanChannel.includes(cleanTitle);
  });
}

// 🔥 โหลดลีก
async function loadLeagues() {
  const res = await fetch("https://corsproxy.io/?https://liveplayback.net/api/leagues");
  const data = await res.json();

  const bar = document.getElementById("leagueBar");
  bar.innerHTML = "";

  data.data.forEach(l => {
    leaguesMap[l.league_id] = l;
  });

  data.data.sort((a,b) => a.league_order - b.league_order);

  // ปุ่มทั้งหมด
  bar.innerHTML += `
  <div onclick="selectLeague(null, this)"
    class="league-item shrink-0 w-20 flex flex-col items-center cursor-pointer">

   <div class="w-16 h-16 rounded-xl bg-gradient-to-br from-indigo-500/80 to-blue-600/80 flex items-center justify-center shadow-xl shadow-blue-500/20 backdrop-blur">
  <img src="https://cdn-icons-png.flaticon.com/512/861/861512.png"
       class="w-10 h-10 drop-shadow-xl transition-all duration-300 hover:scale-110">
</div>

    <span class="mt-2 text-xs">ทั้งหมด</span>
  </div>
`;

  data.data.forEach(l => {
    bar.innerHTML += `
  <div onclick="selectLeague(${l.league_id}, this)"
    class="league-item shrink-0 w-20 flex flex-col items-center cursor-pointer">

    <div class="league-box w-16 h-16 rounded-xl bg-white/10 flex items-center justify-center">
      <img src="${l.logo}" class="w-10 h-10 object-contain">
    </div>

    <span class="mt-2 text-xs text-center">${l.name}</span>
  </div>
`;
  });
}

// 🔥 เลือกลีก
function selectLeague(id, el) {
  selectedLeague = id;

  // 🔥 ลบ active ออกจากทุกตัว
  document.querySelectorAll(".league-item").forEach(i => {
    i.classList.remove("league-active");
  });

  // 🔥 ใส่ active ให้ตัวที่กด
  if (el) {
    el.classList.add("league-active");
  }

  loadMatches();
}
  
function formatThaiTime(dateStr) {
  if (!dateStr) return "-";

  const iso = dateStr
    .replace(" ", "T")
    .replace("+07", "+07:00"); // ✅ แก้ตรงนี้

  const d = new Date(iso);

  if (isNaN(d)) return "-"; // กันพัง

  return d.toLocaleTimeString("th-TH", {
    hour: "2-digit",
    minute: "2-digit",
    timeZone: "Asia/Bangkok"
  });
}
  
function formatThaiDate(dateStr) {
  const d = new Date(dateStr);

  if (isNaN(d)) return dateStr;

  return d.toLocaleDateString("th-TH", {
    weekday: "short",
    day: "numeric",
    month: "short",
    year: "numeric"
  });
}
  
function getCountdown(timeStr) {
  if (!timeStr) return "-";

  const iso = timeStr.replace(" ", "T").replace("+07", "+07:00");
  const target = new Date(iso);
  const now = new Date();

  const diff = target - now;

  if (diff <= 0) return "เริ่มแล้ว";

  const h = Math.floor(diff / 1000 / 60 / 60);
  const m = Math.floor((diff / 1000 / 60) % 60);
  const s = Math.floor((diff / 1000) % 60);

  if (h > 0) return `อีก ${h} ชม. ${m} นาที`;
  if (m > 0) return `อีก ${m} นาที`;
  return `อีก ${s} วิ`;
}

// 🔥 โหลดแมตช์
async function loadMatches() {
  try {
    const res = await fetch("https://liveplayback.net/api/fixtures/date");
    const data = await res.json();

    const container = document.getElementById("matches");
    container.innerHTML = "";

    for (const date in data) {

      let matches = data[date];

      // filter ลีก
      if (selectedLeague) {
        matches = matches.filter(m => m.league === selectedLeague);
      }

      if (matches.length === 0) continue;

      // หัววันที่
      container.innerHTML += `
        <h2 class="col-span-full text-lg mt-4 mb-2 text-yellow-400">
          📅 ${date}
        </h2>
      `;

      matches.sort((a,b) => new Date(a.event_time) - new Date(b.event_time));

      matches.forEach(m => {
        const stream = findStream(m.channel);
        const streamUrl = stream?.servers?.[0]?.url || "#";
        const streamLogo = stream?.logo || "";
        const league = leaguesMap[m.league] || m.league_info;
        const leagueLogo = league?.logo;
        const leagueName = league?.name || league?.name_th;
        
        const home = m.teamhome?.name_th || m.teamhome?.name || "-";
        const away = m.teamaway?.name_th || m.teamaway?.name || "-";

        const homeLogo = m.teamhome?.logo || "";
        const awayLogo = m.teamaway?.logo || "";

        const score = (m.goals_home !== null)
          ? `${m.goals_home} - ${m.goals_away}`
          : "? - ?";
        const time = formatThaiTime(m.event_time);

        // 🔥 สถานะ + สี
        let status = m.status_short;
        let bg = "bg-gray-800";
        let badge = "";
        let minute = "";

        if (status === "NS") {
  badge = getCountdown(m.event_time);
  bg = "bg-white/5";
}
        else if (status === "1H" || status === "2H") {
          badge = status === "1H" ? "ครึ่งแรก" : "ครึ่งหลัง";
          bg = "bg-pink-500/20 border border-pink-500 animate-pulse";
          minute = m.elapsed ? m.elapsed + "'" : "";
        }
        else if (status === "HT") {
          badge = "พักครึ่ง";
          bg = "bg-orange-500/20 border border-orange-400";
        }
        else if (status === "FT") {
          badge = "จบการแข่งขัน";
          bg = "bg-green-500/20 border border-green-400";
        }

        const homeWin = m.goals_home > m.goals_away;
        const awayWin = m.goals_away > m.goals_home;

        container.innerHTML += `
        <div class="${bg} rounded-xl p-4 shadow-md flex flex-col h-full">

          <!-- ลีก -->
          <div class="flex justify-between mb-2 text-sm text-gray-300">
            <div class="flex items-center gap-2">
              <img src="${leagueLogo}" class="w-5 h-5">
              <span class="font-semibold">${leagueName}</span>
            </div>
            <span class="match-time" data-time="${m.event_time}">
              ${time}
            </span>
          </div>

          <!-- ทีม -->
          <div class="flex items-center justify-between">

  <!-- ทีมเหย้า -->
  <div class="flex items-center gap-2 flex-1">
    <img src="${homeLogo}" class="w-6 h-6">
    <span class="text-sm leading-tight break-words ${homeWin ? 'font-bold text-white' : 'text-gray-300'}">
      ${home}
    </span>
  </div>

  <!-- score -->
  <div class="px-2 shrink-0">
    <span class="text-lg font-bold text-green-400 whitespace-nowrap">
      ${score}
    </span>
  </div>

  <!-- ทีมเยือน -->
  <div class="flex items-center gap-2 flex-1 justify-end text-right">
    <span class="text-sm leading-tight break-words ${awayWin ? 'font-bold text-white' : 'text-gray-300'}">
      ${away}
    </span>
    <img src="${awayLogo}" class="w-6 h-6">
  </div>

</div>

        <!-- สถานะ + ช่อง + ปุ่ม -->
<div class="mt-auto pt-3 border-t border-white/10 space-y-2">

  <!-- แถวสถานะ -->
  <div class="flex justify-between items-center">

    <!-- badge -->
    <span class="text-[11px] px-2 py-1 rounded-md
      ${status === '1H' || status === '2H'
        ? 'bg-pink-500 text-white animate-pulse'
        : status === 'FT'
        ? 'bg-green-400 text-black'
        : 'bg-white/10 text-gray-300'}">
      ${badge}
    </span>

    <!-- นาที -->
    <span class="text-[11px] text-orange-400 font-bold">
      ${minute}
    </span>

  </div>

  <!-- แถวช่องถ่ายทอด -->
  <div class="flex items-center justify-between gap-2">

    <!-- ซ้าย: โลโก้ + ชื่อช่อง -->
    <div class="flex items-center gap-2 min-w-0">

      ${streamLogo
        ? `<img src="${streamLogo}" class="w-5 h-5 rounded">`
        : `<div class="w-5 h-5 flex items-center justify-center bg-white/10 rounded">📺</div>`
      }

      <span class="text-xs text-gray-300 truncate">
        ${m.channel || "ไม่มีข้อมูล"}
      </span>

    </div>

    <!-- ขวา: ปุ่ม -->
    ${
      streamUrl && streamUrl !== "#"
      ? `
      <button onclick='openPlayer("${streamUrl}", ${JSON.stringify(stream?.servers || [])})'
  class="text-xs px-3 py-1.5 rounded-lg bg-blue-600 hover:bg-blue-500 transition font-semibold">
  ▶ ดูสด
</button>
      `
      : `
      <span class="text-xs text-gray-500">
        ไม่มีลิ้ง
      </span>
      `
    }

  </div>

</div>

        </div>
        `;
      });
    }

  } catch (err) {
    console.error(err);
    document.getElementById("matches").innerHTML = "❌ โหลดข้อมูลไม่ได้";
  }
}

// 🚀 เริ่มทำงาน
(async () => {
  await loadPlaylist();
  loadLeagues();
  loadMatches();
  setInterval(loadMatches, 30000);
  
})();

let hls;
let currentServers = [];

// เปิด player
function openPlayer(url, servers = []) {
  if (!url) return;

  const modal = document.getElementById("playerModal");
  const video = document.getElementById("videoPlayer");
  const list = document.getElementById("serverList");

  currentServers = servers;

  playStream(url);

  // 🔥 render server buttons
  list.innerHTML = "";
  servers.forEach((s, i) => {
  list.innerHTML += `
   <button onclick="switchServer('${s.url}', this)"
      class="server-btn px-3 py-1 rounded text-xs
      ${i === 0 ? 'bg-blue-600' : 'bg-white/10 hover:bg-blue-600'}">
      ${s.name || 'Server ' + (i+1)}
    </button>
  `;
});

  modal.classList.remove("hidden");
  modal.classList.add("flex");
}

// เล่น stream
function playStream(url) {
  const video = document.getElementById("videoPlayer");

  if (hls) {
    hls.destroy();
  }

  if (Hls.isSupported()) {
    hls = new Hls();
    hls.loadSource(url);
    hls.attachMedia(video);
    hls.on(Hls.Events.MANIFEST_PARSED, function () {
      video.play();
    });
  } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
    video.src = url;
    video.play();
  }
}

// ปิด
function closePlayer() {
  const modal = document.getElementById("playerModal");
  const video = document.getElementById("videoPlayer");

  if (hls) hls.destroy();
  video.pause();
  video.src = "";

  modal.classList.add("hidden");
  modal.classList.remove("flex");
}

// ESC ปิด
document.addEventListener("keydown", (e) => {
  if (e.key === "Escape") closePlayer();
});


function switchServer(url, el) {
  playStream(url);

  // ลบ active จากทุกปุ่ม
  document.querySelectorAll(".server-btn").forEach(btn => {
    btn.classList.remove("bg-blue-600", "active-server");
    btn.classList.add("bg-white/10");
  });

  // ใส่ active ให้ปุ่มที่กด
  el.classList.remove("bg-white/10");
  el.classList.add("bg-blue-600", "active-server");
}
  
function goBack() {
  window.location.href = "https://nongakka.github.io/doofree/index.html";
}
</script>

<!-- 🔥 PLAYER MODAL PRO -->
<div id="playerModal"
  onclick="closePlayer()"
  class="fixed inset-0 bg-black/90 hidden items-center justify-center z-50">

  <div class="relative w-full max-w-5xl mx-4"
       onclick="event.stopPropagation()">

    <!-- ปิด -->
    <button onclick="closePlayer()"
      class="absolute -top-10 right-0 text-white text-xl bg-red-500 px-3 py-1 rounded">
      ✕
    </button>

    <!-- video -->
    <div class="bg-black rounded-xl overflow-hidden">
      <video id="videoPlayer"
        class="w-full aspect-video"
        controls
        autoplay
        muted>
      </video>
    </div>

    <!-- server -->
    <div id="serverList"
      class="mt-3 flex flex-wrap gap-2 justify-center">
    </div>

  </div>
</div>
  
</body>
</html>
