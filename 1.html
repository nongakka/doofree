<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <title>Live Fixtures</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-900 text-white p-4">

<h1 class="text-2xl mb-4">⚽ ตารางแข่งวันนี้</h1>

<div id="matches" class="grid md:grid-cols-3 gap-4"></div>

<script>
async function loadMatches() {
  try {
    const res = await fetch("https://corsproxy.io/?https://liveplayback.net/api/fixtures/date");
    const data = await res.json();

    const container = document.getElementById("matches");
    container.innerHTML = "";

    for (const date in data) {

      // 🔥 หัวข้อวัน
      container.innerHTML += `
        <h2 class="col-span-3 text-lg mt-4 mb-2 text-gray-300">
          📅 ${date}
        </h2>
      `;

      let matches = data[date];

      matches.sort((a,b) => new Date(a.event_time) - new Date(b.event_time));

      matches.forEach(m => {

        const home = m.teamhome?.name_th || m.teamhome?.name || "-";
        const away = m.teamaway?.name_th || m.teamaway?.name || "-";

        const homeLogo = m.teamhome?.logo || "";
        const awayLogo = m.teamaway?.logo || "";

        const score = (m.goals_home !== null)
          ? `${m.goals_home} - ${m.goals_away}`
          : "? - ?";

        const time = new Date(m.event_time).toLocaleTimeString("th-TH", {
          hour: "2-digit",
          minute: "2-digit"
        });

        // 🔥 สีตามสถานะ
        let bg = "bg-gray-800";
        let status = m.status_short;

        if (status === "1H" || status === "2H") {
          bg = "bg-purple-900"; // live
        } else if (status === "HT") {
          bg = "bg-orange-500";
        } else if (status === "FT") {
          bg = "bg-green-700";
        }

        container.innerHTML += `
          <div class="${bg} p-4 rounded-xl shadow hover:scale-105 transition">

            <div class="flex justify-between items-center">

              <div class="flex items-center gap-2">
                <img src="${homeLogo}" class="w-5 h-5">
                <span>${home}</span>
              </div>

              <span class="font-bold text-lg">${score}</span>

              <div class="flex items-center gap-2">
                <span>${away}</span>
                <img src="${awayLogo}" class="w-5 h-5">
              </div>

            </div>

            <div class="mt-2 text-sm flex justify-between text-gray-300">
              <span>${time}</span>
              <span>${status}</span>
            </div>

          </div>
        `;
      });
    }

  } catch (err) {
    console.error(err);
  }
}

loadMatches();
setInterval(loadMatches, 30000);
</script>

</body>
</html>
