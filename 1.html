<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <title>Live Score</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-900 text-white p-4">

<h1 class="text-2xl mb-4">⚽ ตารางแข่งขัน</h1>

<!-- 🔥 แถบลีก -->
<div id="leagueBar" class="flex gap-4 overflow-x-auto pb-2 mb-4"></div>

<!-- 🔥 แมตช์ -->
<div id="matches" class="grid md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4"></div>

<script>
let selectedLeague = null;
let leaguesMap = {};

// 🔥 โหลดลีก
async function loadLeagues() {
  const res = await fetch("https://corsproxy.io/?https://liveplayback.net/api/leagues");
  const data = await res.json();

  const bar = document.getElementById("leagueBar");
  bar.innerHTML = "";

  data.data.forEach(l => {
    leaguesMap[l.league_id] = l;
  });

  data.data.sort((a,b) => a.league_order - b.league_order);

  // ปุ่มทั้งหมด
  bar.innerHTML += `
    <div onclick="selectLeague(null)"
      class="shrink-0 w-20 flex flex-col items-center cursor-pointer">
      <div class="w-16 h-16 rounded-xl bg-blue-600 flex items-center justify-center">
        🌍
      </div>
      <span class="mt-2 text-xs">ทั้งหมด</span>
    </div>
  `;

  data.data.forEach(l => {
    bar.innerHTML += `
      <div onclick="selectLeague(${l.league_id})"
        class="shrink-0 w-20 flex flex-col items-center cursor-pointer">

        <div class="w-16 h-16 rounded-xl bg-white/10 flex items-center justify-center">
          <img src="${l.logo}" class="w-10 h-10 object-contain">
        </div>

        <span class="mt-2 text-xs text-center">${l.name}</span>
      </div>
    `;
  });
}

// 🔥 เลือกลีก
function selectLeague(id) {
  selectedLeague = id;
  loadMatches();
}

// 🔥 โหลดแมตช์
async function loadMatches() {
  try {
    const res = await fetch("https://corsproxy.io/?https://liveplayback.net/api/fixtures/date");
    const data = await res.json();

    const container = document.getElementById("matches");
    container.innerHTML = "";

    for (const date in data) {

      let matches = data[date];

      // filter ลีก
      if (selectedLeague) {
        matches = matches.filter(m => m.league === selectedLeague);
      }

      if (matches.length === 0) continue;

      // หัววันที่
      container.innerHTML += `
        <h2 class="col-span-full text-lg mt-4 mb-2 text-yellow-400">
          📅 ${date}
        </h2>
      `;

      matches.sort((a,b) => new Date(a.event_time) - new Date(b.event_time));

      matches.forEach(m => {

        const league = leaguesMap[m.league] || m.league_info;
        const leagueLogo = league?.logo;
        const leagueName = league?.name || league?.name_th;
        
        const home = m.teamhome?.name_th || m.teamhome?.name || "-";
        const away = m.teamaway?.name_th || m.teamaway?.name || "-";

        const homeLogo = m.teamhome?.logo || "";
        const awayLogo = m.teamaway?.logo || "";

        const score = (m.goals_home !== null)
          ? `${m.goals_home} - ${m.goals_away}`
          : "? - ?";

        const time = new Date(m.event_time).toLocaleTimeString("th-TH", {
          hour: "2-digit",
          minute: "2-digit"
        });

        // 🔥 สถานะ + สี
        let status = m.status_short;
        let bg = "bg-gray-800";
        let badge = "";
        let minute = "";

        if (status === "NS") {
          badge = "กำลังจะเริ่ม";
          bg = "bg-white/5";
        }
        else if (status === "1H" || status === "2H") {
          badge = status === "1H" ? "ครึ่งแรก" : "ครึ่งหลัง";
          bg = "bg-pink-500/20 border border-pink-500 animate-pulse";
          minute = m.elapsed ? m.elapsed + "'" : "";
        }
        else if (status === "HT") {
          badge = "พักครึ่ง";
          bg = "bg-orange-500/20 border border-orange-400";
        }
        else if (status === "FT") {
          badge = "จบการแข่งขัน";
          bg = "bg-green-500/20 border border-green-400";
        }

        const homeWin = m.goals_home > m.goals_away;
        const awayWin = m.goals_away > m.goals_home;

        container.innerHTML += `
        <div class="${bg} rounded-xl p-4 shadow-md flex flex-col h-full">

          <!-- ลีก -->
          <div class="flex justify-between mb-2 text-sm text-gray-300">
            <div class="flex items-center gap-2">
              <img src="${leagueLogo}" class="w-5 h-5">
              <span class="font-semibold">${leagueName}</span>
            </div>
            <span>${time}</span>
          </div>

          <!-- ทีม -->
          <div class="flex justify-between items-center">

            <div class="flex items-center gap-2 min-w-0">
              <img src="${homeLogo}" class="w-6 h-6">
              <span class="text-sm truncate max-w-[90px] ${homeWin ? 'font-bold text-white' : 'text-gray-300'}">
                ${home}
              </span>
            </div>

            <span class="text-lg font-bold text-green-400">
              ${score}
            </span>

          <div class="flex items-center gap-2 min-w-0">
              <span class="text-sm truncate max-w-[90px] ${awayWin ? 'font-bold text-white' : 'text-gray-300'}">
                ${away}
              </span>
              <img src="${awayLogo}" class="w-6 h-6">
            </div>

          </div>

          <!-- สถานะ -->
          <div class="mt-auto flex justify-between items-center pt-2">

            <span class="text-xs px-2 py-1 rounded-md bg-white/10">
              ${badge}
            </span>

            <span class="text-xs text-orange-400 font-bold">
              ${minute}
            </span>

          </div>

        </div>
        `;
      });
    }

  } catch (err) {
    console.error(err);
    document.getElementById("matches").innerHTML = "❌ โหลดข้อมูลไม่ได้";
  }
}

// 🚀 เริ่มทำงาน
loadLeagues();
loadMatches();
setInterval(loadMatches, 30000);
</script>

</body>
</html>
