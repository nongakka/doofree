<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <title>Live Fixtures</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-900 text-white p-4">

<h1 class="text-2xl mb-4">⚽ ตารางแข่งวันนี้</h1>

<div id="matches" class="grid md:grid-cols-3 gap-4"></div>

<script>
async function loadMatches() {
  try {
    const res = await fetch("https://corsproxy.io/?https://liveplayback.net/api/fixtures/date");
    const data = await res.json();

    console.log("DATA:", data);

    const container = document.getElementById("matches");
    container.innerHTML = "";

    // 🔥 แปลง object → array ทั้งหมด
    const matches = Object.values(data).flat();

    if (!matches || matches.length === 0) {
      container.innerHTML = "❌ ไม่มีข้อมูล";
      return;
    }

    matches.forEach(m => {
      const home = m.teamhome?.name_th || m.teamhome?.name || "-";
      const away = m.teamaway?.name_th || m.teamaway?.name || "-";

      container.innerHTML += `
        <div class="bg-gray-800 p-4 rounded-xl mb-2">
          <div>${home} vs ${away}</div>
        </div>
      `;
    });

  } catch (err) {
    console.error(err);
  }
}

loadMatches();

</script>

</body>
</html>
