<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>Live Fixtures PRO</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-900 text-white p-4">

<h1 class="text-2xl mb-4">⚽ ตารางแข่งขัน</h1>

<!-- Tabs -->
<div class="flex gap-2 mb-4">
  <button onclick="setTab('all')" class="tab px-3 py-1 bg-blue-500 rounded">ทั้งหมด</button>
  <button onclick="setTab('national')" class="tab px-3 py-1 bg-gray-700 rounded">ทีมชาติ</button>
  <button onclick="setTab('top')" class="tab px-3 py-1 bg-gray-700 rounded">ลีกหลัก</button>
  <button onclick="setTab('other')" class="tab px-3 py-1 bg-gray-700 rounded">อื่นๆ</button>
</div>

<div id="matches" class="grid md:grid-cols-2 lg:grid-cols-3 gap-4"></div>

<script>
let allMatches = [];
let currentTab = "all";

// 🔥 โหลด list
async function loadFixtures() {
  const res = await fetch("https://corsproxy.io/?https://liveplayback.net/api/fixtures/date");
  const data = await res.json();
  return Object.values(data).flat();
}

// 🔥 โหลด detail ทีเดียว (เร็ว)
async function loadDetails(ids) {
  const requests = ids.map(id =>
    fetch(`https://corsproxy.io/?https://liveplayback.net/api/fixture/${id}`)
      .then(r => r.json())
  );
  return await Promise.all(requests);
}

// 🎯 จัดหมวดอัตโนมัติ
function getCategory(m) {
  const name = m.league?.name || "";

  if (name.includes("World") || name.includes("Cup") || name.includes("Qualification") || name.includes("Friendlies"))
    return "national";

  if (
    name.includes("Premier League") ||
    name.includes("La Liga") ||
    name.includes("Serie A") ||
    name.includes("Bundesliga") ||
    name.includes("Ligue 1") ||
    name.includes("Champions League")
  )
    return "top";

  return "other";
}

// 🎨 สีตามสถานะ
function getCardStyle(status) {
  if (status === "FT") return "bg-green-500/20 border border-green-400";
  if (status === "HT") return "bg-yellow-500/20 border border-yellow-400";
  if (status === "1H" || status === "2H") return "bg-pink-500/20 border border-pink-400 animate-pulse";
  return "bg-gray-800";
}

// 🧠 แปลสถานะ
function getStatusText(s) {
  return {
    NS: "กำลังจะเริ่ม",
    1H: "ครึ่งแรก",
    HT: "พักครึ่ง",
    2H: "ครึ่งหลัง",
    FT: "จบการแข่งขัน"
  }[s] || s;
}

// 🧩 render การ์ด
function renderMatch(m) {
  const home = m.teamhome?.name_th || m.teamhome?.name;
  const away = m.teamaway?.name_th || m.teamaway?.name;

  const homeLogo = m.teamhome?.logo;
  const awayLogo = m.teamaway?.logo;

  const leagueName = m.league?.name;
  const leagueLogo = m.league?.logo;

  const score = m.goals_home != null
    ? `${m.goals_home} - ${m.goals_away}`
    : "? - ?";

  const time = new Date(m.event_time).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});

  return `
  <div class="p-4 rounded-xl ${getCardStyle(m.status_short)}">
    
    <div class="flex justify-between mb-2">
      <div class="flex items-center gap-2">
        <img src="${leagueLogo}" class="w-5 h-5">
        <span class="text-sm">${leagueName}</span>
      </div>
      <span class="text-xs text-gray-400">${time}</span>
    </div>

    <div class="flex justify-between items-center">
      <div class="flex items-center gap-2">
        <img src="${homeLogo}" class="w-6 h-6">
        <span>${home}</span>
      </div>

      <span class="font-bold text-lg">${score}</span>

      <div class="flex items-center gap-2">
        <img src="${awayLogo}" class="w-6 h-6">
        <span>${away}</span>
      </div>
    </div>

    <div class="mt-2 text-xs text-gray-300">
      ${getStatusText(m.status_short)}
    </div>
  </div>
  `;
}

// 🔄 render ตาม tab
function render() {
  const container = document.getElementById("matches");

  let list = allMatches;

  if (currentTab !== "all") {
    list = list.filter(m => getCategory(m) === currentTab);
  }

  container.innerHTML = list.map(renderMatch).join("");
}

// 🎛️ เปลี่ยน tab
function setTab(tab) {
  currentTab = tab;

  document.querySelectorAll(".tab").forEach(b => b.classList.remove("bg-blue-500"));
  event.target.classList.add("bg-blue-500");

  render();
}

// 🚀 init
async function init() {
  const fixtures = await loadFixtures();

  // เอาแค่ 15 แมตแรก (กันช้า)
  const ids = fixtures.slice(0, 15).map(m => m.id);

  const details = await loadDetails(ids);

  allMatches = details;

  render();
}

init();

</script>

</body>
</html>
