<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <title>Live Fixtures</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-900 text-white p-4">

<h1 class="text-2xl mb-4">⚽ ตารางแข่งวันนี้</h1>

<div id="matches" class="grid md:grid-cols-3 gap-4"></div>

<script>
async function loadMatches() {
  try {
    // 🔥 โหลด fixtures + leagues พร้อมกัน
    const [res1, res2] = await Promise.all([
      fetch("https://corsproxy.io/?https://liveplayback.net/api/fixtures/date"),
      fetch("https://corsproxy.io/?https://liveplayback.net/api/leagues")
    ]);

    const fixtureData = await res1.json();
    const leagueData = await res2.json();

    const container = document.getElementById("matches");
    container.innerHTML = "";

    // 🔥 map league_id → league info
    const leagues = {};
    leagueData.data.forEach(l => {
      leagues[l.league_id] = l;
    });

    // 🔥 loop ตามวัน
    for (const date in fixtureData) {

      container.innerHTML += `
        <h2 class="col-span-3 text-lg mt-4 mb-2 text-gray-300">
          📅 ${date}
        </h2>
      `;

      let matches = fixtureData[date];

      matches.sort((a,b) => new Date(a.event_time) - new Date(b.event_time));

      matches.forEach(m => {

        const home = m.teamhome?.name_th || m.teamhome?.name || "-";
        const away = m.teamaway?.name_th || m.teamaway?.name || "-";

        const homeLogo = m.teamhome?.logo || "";
        const awayLogo = m.teamaway?.logo || "";

        const score = (m.goals_home !== null)
          ? `${m.goals_home} - ${m.goals_away}`
          : "? - ?";

        const time = new Date(m.event_time).toLocaleTimeString("th-TH", {
          hour: "2-digit",
          minute: "2-digit"
        });

        // 🔥 ดึงลีก
        const league = leagues[m.league];
        const leagueName = league?.name_th || league?.name || "ไม่ทราบลีก";
        const leagueLogo = league?.logo || "";

        // 🔥 แปลสถานะ
        let status = m.status_short;
        let bg = "bg-gray-800";

        if (status === "NS") status = "ยังไม่เริ่ม";
        else if (status === "1H") {
          status = "ครึ่งแรก";
          bg = "bg-purple-900";
        }
        else if (status === "2H") {
          status = "ครึ่งหลัง";
          bg = "bg-purple-900";
        }
        else if (status === "HT") {
          status = "พักครึ่ง";
          bg = "bg-orange-500";
        }
        else if (status === "FT") {
          status = "จบแล้ว";
          bg = "bg-green-700";
        }

        container.innerHTML += `
          <div class="${bg} p-4 rounded-xl shadow hover:scale-105 transition">

            <!-- ลีก -->
            <div class="flex items-center gap-2 text-sm text-gray-300 mb-2">
              <img src="${leagueLogo}" class="w-4 h-4">
              <span>${leagueName}</span>
            </div>

            <!-- ทีม -->
            <div class="flex justify-between items-center">

              <div class="flex items-center gap-2">
                <img src="${homeLogo}" class="w-5 h-5">
                <span>${home}</span>
              </div>

              <span class="font-bold text-lg">${score}</span>

              <div class="flex items-center gap-2">
                <span>${away}</span>
                <img src="${awayLogo}" class="w-5 h-5">
              </div>

            </div>

            <!-- เวลา + สถานะ -->
            <div class="mt-2 text-sm flex justify-between text-gray-300">
              <span>${time}</span>
              <span>${status}</span>
            </div>

          </div>
        `;
      });
    }

  } catch (err) {
    console.error(err);
    document.getElementById("matches").innerHTML = "❌ โหลดข้อมูลไม่ได้";
  }
}

loadMatches();
setInterval(loadMatches, 30000);
</script>

</body>
</html>
