<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <title>Live Fixtures</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-900 text-white p-4">

<h1 class="text-2xl mb-4">⚽ ตารางแข่งวันนี้</h1>

<!-- Tabs -->
<div class="flex gap-2 mb-4">
  <button onclick="setTab('national')" class="tab-btn bg-blue-600 px-3 py-1 rounded">ทีมชาติ</button>
  <button onclick="setTab('top')" class="tab-btn bg-gray-700 px-3 py-1 rounded">ลีกสูงสุด</button>
  <button onclick="setTab('second')" class="tab-btn bg-gray-700 px-3 py-1 rounded">ลีกรอง</button>
  <button onclick="setTab('other')" class="tab-btn bg-gray-700 px-3 py-1 rounded">อื่นๆ</button>
</div>
  
<div id="matches" class="grid md:grid-cols-3 gap-4"></div>

<script>
let currentTab = "top";

// 🔥 กลุ่มลีก
const NATIONAL = [1,2,3,848]; // บอลโลก / UCL / Nations
const TOP = [39,140,135,78,61]; // ลีกใหญ่
const SECOND = [40,141,136,79,62]; // ลีก 2

function getLeagueType(id) {
  if (NATIONAL.includes(id)) return "national";
  if (TOP.includes(id)) return "top";
  if (SECOND.includes(id)) return "second";
  return "other";
}

function setTab(tab) {
  currentTab = tab;

  // เปลี่ยนสีปุ่ม
  document.querySelectorAll(".tab-btn").forEach(btn => {
    btn.classList.remove("bg-blue-600");
    btn.classList.add("bg-gray-700");
  });

  event.target.classList.remove("bg-gray-700");
  event.target.classList.add("bg-blue-600");

  loadMatches();
}

async function loadMatches() {
  try {
    const [res1, res2] = await Promise.all([
      fetch("https://corsproxy.io/?https://liveplayback.net/api/fixtures/date"),
      fetch("https://corsproxy.io/?https://liveplayback.net/api/leagues")
    ]);

    const fixtureData = await res1.json();
    const leagueData = await res2.json();

    const container = document.getElementById("matches");
    container.innerHTML = "";

    const leagues = {};
    leagueData.data.forEach(l => {
      leagues[l.league_id] = l;
    });

    for (const date in fixtureData) {

      let matches = fixtureData[date];

      // 🔥 filter ตาม tab
      matches = matches.filter(m => getLeagueType(m.league) === currentTab);

      if (matches.length === 0) continue;

      container.innerHTML += `
        <h2 class="col-span-3 text-lg mt-4 mb-2 text-yellow-400">
          📅 ${date}
        </h2>
      `;

      matches.forEach(m => {

        const league = leagues[m.league];

        const home = m.teamhome?.name_th || m.teamhome?.name;
        const away = m.teamaway?.name_th || m.teamaway?.name;

        const score = (m.goals_home !== null)
          ? `${m.goals_home} - ${m.goals_away}`
          : "? - ?";

        const time = new Date(m.event_time).toLocaleTimeString("th-TH", {
          hour: "2-digit",
          minute: "2-digit"
        });

        container.innerHTML += `
          <div class="bg-gray-800 p-4 rounded-xl">

            <div class="text-sm text-gray-400 mb-1">
              ${league?.name}
            </div>

            <div class="flex justify-between">
              <span>${home}</span>
              <span class="font-bold">${score}</span>
              <span>${away}</span>
            </div>

            <div class="text-sm text-gray-400 mt-1 flex justify-between">
              <span>${time}</span>
              <span>${m.status_short}</span>
            </div>

          </div>
        `;
      });
    }

  } catch (err) {
    console.error(err);
  }
}

loadMatches();
</script>

</body>
</html>
