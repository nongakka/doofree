<script>

let playlists = JSON.parse(localStorage.getItem("iptv_playlists")) || [];
let activePlaylistIndex = null;
let allChannels = [];
let currentCategory = "ทั้งหมด";

let forcedPlayer = null;
let currentChannel = null;

let hls=null;
let dashPlayer=null;
let jwInstance=null;

function setPlayerLabel(text){
    const label = document.getElementById("player-type-label");
    if(label){
        label.textContent = "ตัวเล่น: " + text;
    }
}

const grid=document.getElementById("movieGrid");
const categoryList=document.getElementById("categoryList");
let video=document.getElementById("videoPlayer");
const overlay=document.getElementById("overlay");
const playerContainer=document.getElementById("player-container");
const closeBtn = document.getElementById("closePlayer");

closeBtn.addEventListener("click", () => {
    overlay.classList.remove("active");
    playerContainer.classList.remove("active");
    resetPlayers();
});

playerContainer.addEventListener("click", e => {
    e.stopPropagation();
});
const playlistUI = document.getElementById("playlistContainer");

/* SAVE */
function savePlaylists(){
localStorage.setItem("iptv_playlists",JSON.stringify(playlists));
}

document.getElementById("backHome").onclick = () => {
    window.location.href = "https://nongakka.github.io/doofree/index.html"; 
};

/* RENDER PLAYLIST UI */
function renderPlaylists(){
playlistUI.innerHTML="";

playlists.forEach((pl,index)=>{

// ป้องกัน playlist เสีย
if(!pl.channels) pl.channels = [];

const div=document.createElement("div");
div.className="playlist-box";

div.innerHTML=`
<div class="playlist-name" title="${pl.name}">
${pl.name} (${pl.channels.length})
</div>

<div class="playlist-actions">
<button onclick="refreshOne(${index});event.stopPropagation();" 
style="background:#00c853;">🔄</button>

<button onclick="deletePlaylist(${index});event.stopPropagation();" 
style="background:red;">✕</button>
</div>
`;

if(index===activePlaylistIndex){
    div.classList.add("active");
}


div.onclick=()=>{
activePlaylistIndex=index;
allChannels=pl.channels;
currentCategory="ทั้งหมด";
buildCategories();
renderGrid();
};

playlistUI.appendChild(div);

});
}

/* DELETE */
function deletePlaylist(index){
if(!confirm("ลบ Playlist นี้?")) return;

playlists.splice(index,1);

if(activePlaylistIndex===index){
activePlaylistIndex=null;
allChannels=[];
grid.innerHTML="";
categoryList.innerHTML="";
}

savePlaylists();
renderPlaylists();
}

/* REFRESH ONE */
function refreshOne(index){
const pl=playlists[index];
if(!pl.source) return alert("Playlist นี้ไม่ใช่ URL");

fetch(pl.source+"?t="+Date.now())
.then(r=>r.text())
.then(text=>{
parseM3U(text,pl.source,index);
alert("รีเฟรชสำเร็จ ✅");
})
.catch(()=>alert("รีเฟรชไม่สำเร็จ ❌"));
}

/* FILE LOAD */
document.getElementById("fileInput").addEventListener("change",e=>{
if(!e.target.files.length) return;

const reader=new FileReader();
reader.onload=()=>{
parseM3U(reader.result,null,null,e.target.files[0].name);
};
reader.readAsText(e.target.files[0]);
});

/* URL LOAD */
function loadURL(){
const url=document.getElementById("urlInput").value.trim();
if(!url) return;
fetch(url)
.then(r=>r.text())
.then(text=>{
parseM3U(text,url);
})
.catch(()=>alert("โหลด URL ไม่สำเร็จ"));
}

/* PARSE */
function parseM3U(data,source,indexOverride=null,fileName=null){

let channels=[];
const lines=data.split(/\r?\n/);
let current=null;
let pendingDRM=null;

lines.forEach(line=>{
line=line.trim();

if(line.startsWith("#EXTINF")){
    const title=line.substring(line.lastIndexOf(",")+1).trim() || "ไม่ทราบชื่อ";
    const group=(line.match(/group-title="(.*?)"/)||[])[1]||"อื่นๆ";
    const logo=(line.match(/tvg-logo="(.*?)"/)||[])[1]||"";
    current={title,group,logo};
    pendingDRM=null;
}

else if(line.includes("license_type=")){
    pendingDRM=pendingDRM||{};
    if(line.toLowerCase().includes("widevine")) pendingDRM.type="widevine";
    if(line.toLowerCase().includes("clearkey")) pendingDRM.type="clearkey";
}

else if(line.includes("license_key=")){
    pendingDRM = pendingDRM || {};
    const value = line.substring(line.indexOf("license_key=") + 12).trim();

    if(value.startsWith("http")){
        // Widevine license server
        pendingDRM.type = "widevine";
        pendingDRM.licenseServer = value;
    }else{
        // ClearKey
        const parts = value.split(":");
        if(parts.length === 2){
            pendingDRM.type = "clearkey";
            pendingDRM.keyId = parts[0].trim();
            pendingDRM.key = parts[1].trim();
        }
    }
}

else if(line && !line.startsWith("#") && current){

    // รับทุก URL ที่เป็น http
    if(line.startsWith("http")){

        current.url = line;

        if(pendingDRM) current.drm = pendingDRM;

        channels.push(current);
    }

    current = null;
}

});

document.getElementById("searchInput").value="";

const playlistData={
    name:fileName || (source ? new URL(source).hostname : "Local File"),
    source:source,
    channels:channels
};

if(indexOverride!==null){
    playlists[indexOverride]=playlistData;
    activePlaylistIndex=indexOverride;
}else{
    playlists.push(playlistData);
    activePlaylistIndex=playlists.length-1;
}

savePlaylists();
renderPlaylists();

allChannels=channels;
currentCategory="ทั้งหมด";
buildCategories();
renderGrid();
}

/* CATEGORY */
function buildCategories(){
const groups=["ทั้งหมด",...new Set(allChannels.map(c=>c.group))];
categoryList.innerHTML="";

groups.forEach((g,i)=>{
const li=document.createElement("li");
li.textContent=g;

if(i===0){
li.classList.add("active");
}

li.onclick=()=>{
categoryList.querySelectorAll("li")
.forEach(el=>el.classList.remove("active"));
li.classList.add("active");
currentCategory=g;
renderGrid();
};

categoryList.appendChild(li);
});
}

/* SEARCH */
document.getElementById("searchInput").addEventListener("input",renderGrid);

/* GRID */
function renderGrid(){
grid.innerHTML="";
const keyword=document.getElementById("searchInput").value.toLowerCase();
const filtered=allChannels.filter(c=>{
return (currentCategory==="ทั้งหมด"||c.group===currentCategory)
&& c.title.toLowerCase().includes(keyword);
});
filtered.forEach(ch=>{
const card=document.createElement("div");
card.className="movie-card";
card.innerHTML=`<img loading="lazy" src="${ch.logo||'https://via.placeholder.com/300x450?text=No+Image'}"><div class="movie-title">${ch.title}</div>`;
card.onclick=()=>playStream(ch);
grid.appendChild(card);
});
}

/* PLAYER RESET */
function resetPlayers(){

    console.log("Reset Players");

    if(hls){
        try{ hls.destroy(); }catch(e){}
        hls = null;
    }

    if(dashPlayer){
        try{ dashPlayer.reset(); }catch(e){}
        dashPlayer = null;
    }
        
    if(window.jwplayer){
        try{ jwplayer("jw-player").remove(); }catch(e){}
    }

    document.getElementById("jw-player").innerHTML="";
    const oldVideo = document.getElementById("videoPlayer");

    if(oldVideo){

        oldVideo.pause();
        oldVideo.removeAttribute("src");
        oldVideo.load();

        const newVideo = oldVideo.cloneNode(true);
        oldVideo.parentNode.replaceChild(newVideo, oldVideo);

        video = newVideo;

        video.style.display = "block";
        document.getElementById("jw-player").style.display = "none";
    }

    setPlayerLabel("Auto");
}
function startJW(channel){
    video.style.display="none";
    document.getElementById("jw-player").style.display="block";

    jwInstance = jwplayer("jw-player").setup({
        file: channel.url,
        width: "100%",
        height: "100%",
        autostart: true
    });
}

function playStream(channel){
    currentChannel = channel; 
    overlay.classList.add("active");
    playerContainer.classList.add("active");
    resetPlayers();

    if(!channel.url) return;

    const url = channel.url.toLowerCase();

// =========================

    // =========================
    if(forcedPlayer === "jw"){
        setPlayerLabel("JW (บังคับ)");

    }

   if(forcedPlayer === "html5"){

    video.style.display="block";

    // =========================

        };

        if(channel.drm.type === "widevine"){
            config.drm = {
                widevine: {
                    url: channel.drm.licenseServer
                }
            };
        }

        if(channel.drm.type === "clearkey"){
            config.drm = {
                clearkey: {
                    keyId: channel.drm.keyId,
                    key: channel.drm.key
                }
            };
        }

        jwInstance = jwplayer("jw-player").setup(config);
        return;
    }

    // =========================
    // 2️⃣ MPD ไม่มี DRM → dash.js
    // =========================
    if(url.includes(".mpd")){
	setPlayerLabel("dash.js");
        video.style.display="block";
        document.getElementById("jw-player").style.display="none";

        dashPlayer = dashjs.MediaPlayer().create();
        dashPlayer.initialize(video, channel.url, true);

        dashPlayer.on(dashjs.MediaPlayer.events.ERROR, function(e){

    if(e.error){

    try{ dashPlayer.reset(); }catch(e){}
    dashPlayer = null;

    console.log("dash fatal → fallback JW");
    startJWfallback(channel);
}

});
            

        return;
    }

    // =========================
    // 3️⃣ M3U8 → HLS.js
    // =========================
    if(url.includes(".m3u8")){
	setPlayerLabel("HLS.js");
        video.style.display="block";
        document.getElementById("jw-player").style.display="none";

        if(video.canPlayType("application/vnd.apple.mpegurl")){
            video.src = channel.url;
            video.play().catch(()=>{});
        }
        else if(typeof Hls !== "undefined" && Hls.isSupported()){

            hls = new Hls({
                enableWorker:true
            });

            hls.loadSource(channel.url);
            hls.attachMedia(video);
	    hls.on(Hls.Events.MANIFEST_PARSED, function() {
    video.play().catch(()=>{});
});
            hls.on(Hls.Events.ERROR, function(event, data){
                if(data.fatal){

    try{ hls.destroy(); }catch(e){}
    hls = null;

    console.log("HLS fatal → fallback JW");
    startJWfallback(channel);
}
                   
            });
        }
        else{
            startJWfallback(channel);
        }

        return;
    }

    // =========================
    // 4️⃣ อื่น ๆ → JW
    // =========================
    startJWfallback(channel);
}
function startJWfallback(channel){

    setPlayerLabel("JW (Fallback)");
    video.style.display="none";
    document.getElementById("jw-player").style.display="block";

    let type = null;

    if(channel.url.toLowerCase().includes(".mpd")) type = "dash";
    else if(channel.url.toLowerCase().includes(".m3u8")) type = "hls";

    jwInstance = jwplayer("jw-player").setup({
        file: channel.url,
        width: "100%",
        height: "100%",
        autostart: true,
        primary: "html5",
        type: type
    });

}
/* CLOSE */
overlay.onclick=()=>{
overlay.classList.remove("active");
playerContainer.classList.remove("active");
resetPlayers();
};

/* INIT */

/* THEME TOGGLE + SAVE */
const themeBtn = document.getElementById("themeToggle");

// โหลดค่าที่เคยเลือก
if(localStorage.getItem("theme")==="light"){
    document.body.classList.add("light");
}

updateThemeText();

themeBtn.addEventListener("click", () => {
    document.body.classList.toggle("light");

    if(document.body.classList.contains("light")){
        localStorage.setItem("theme","light");
    } else {
        localStorage.setItem("theme","dark");
    }

    updateThemeText();
});

function updateThemeText(){
    if(document.body.classList.contains("light")){
        themeBtn.textContent = "🌙 โหมดมืด";
    } else {
        themeBtn.textContent = "☀️ โหมดสว่าง";
    }
}

document.getElementById("switchPlayerBtn").addEventListener("click", () => {

if(!currentChannel) return;

if(forcedPlayer === null){
    forcedPlayer = "jw";
}
else if(forcedPlayer === "jw"){
    forcedPlayer = "html5";
}
else{
    forcedPlayer = null;
}

let text = "🔁 Auto";
if(forcedPlayer === "jw") text = "🔁 JWPlayer";
if(forcedPlayer === "html5") text = "🔁 HTML5";

document.getElementById("switchPlayerBtn").textContent = text;

playStream(currentChannel);

});
renderPlaylists();


</script>
