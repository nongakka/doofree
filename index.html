<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',sans-serif;}

body{
  display:flex;
  height:100vh;
  background:linear-gradient(135deg,#0f0c29,#302b63,#24243e);
  color:#fff;
  overflow:hidden;
}

/* MOBILE BUTTON */
#mobileToggle{
  position:fixed;
  top:15px;
  left:15px;
  background:linear-gradient(90deg,#ff512f,#dd2476);
  padding:8px 14px;
  border-radius:8px;
  cursor:pointer;
  z-index:1000;
  display:none;
  font-weight:bold;
  transition:0.3s;
}
#mobileToggle:hover{transform:scale(1.05);}

/* SIDEBAR */
#menu{
  width:200px;
  background:rgba(20,20,35,0.95);
  backdrop-filter:blur(15px);
  border-right:1px solid rgba(255,255,255,0.08);
  padding:20px;
  overflow-y:auto;
  transition:0.4s;
  box-shadow:5px 0 40px rgba(0,0,0,0.6);
}
#menu.hidden{transform:translateX(-100%);}

/* LOGO */
.logo-box{
  text-align:center;
  margin-bottom:25px;
  padding-bottom:15px;
  border-bottom:1px solid rgba(255,255,255,0.1);
}
.logo-box img{
  width:100%;
  max-width:180px;
  border-radius:20px;
  box-shadow:0 0 30px rgba(255,0,150,0.7);
}

/* HOME */
.home-btn{
  display:block;
  padding:10px;
  text-align:center;
  background:linear-gradient(90deg,#00c6ff,#0072ff);
  border-radius:8px;
  margin-bottom:15px;
  cursor:pointer;
  font-weight:bold;
  transition:0.3s;
}
.home-btn:hover{transform:scale(1.05);}

/* MENU TITLE */
.menu-title{
  padding:12px;
  border-radius:12px;
  cursor:pointer;
  font-weight:600;
  margin:12px 0 6px;
  transition:0.3s ease;

}
  
.menu-title:hover{transform:scale(1.05);}

.premium {background: linear-gradient(90deg, #ff416c, #ff4b2b);} /* ชมพูแดงร้อนแรง */
.movie {background: linear-gradient(90deg, #36d1dc, #5b86e5);} /* ฟ้า → น้ำเงิน สดใส */
.series {background: linear-gradient(90deg, #f9d423, #ff4e50);} /* เหลืองทอง → แดงอมส้ม */
.anime {background: linear-gradient(90deg, #11998e, #38ef7d);} /* เขียว → เขียวอ่อน สดชื่น */
.short {background: linear-gradient(90deg, #8e2de2, #4a00e0);} /* ม่วงเข้ม → ม่วงสด */
.vip {background: linear-gradient(90deg, #fcb045, #fd1d1d);} /* ทอง → แดงร้อนแรง */

/* SUBMENU */
.submenu{
  max-height:0;
  overflow:hidden;
  transition:max-height 0.4s ease;
}
.submenu.open{max-height:1000px;}

/* ACTIVE MENU TITLE */
.menu-title.active-title{
  box-shadow: 0 0 20px rgba(255,255,255,0.4);
  transform: scale(1.05);
  border:2px solid #fff;
}
/* LINKS */
.menu-link{
  display:block;
  padding:10px 15px;
  font-size:14px;
  cursor:pointer;
  transition:0.3s;
  border-radius:6px;
}
.menu-link:hover{
  background:#e94560;
  transform:translateX(6px);
}
/* ACTIVE MENU LINK */
.menu-link.active{
  background: linear-gradient(90deg,#ff512f,#dd2476);
  box-shadow: 0 0 15px rgba(255,0,150,0.7);
  transform: translateX(6px);
  font-weight: bold;
}
/* PLAYER */
#main-player{
  flex:1;
  position:relative;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  background:radial-gradient(circle at center,#1a1a2e 0%,#000 80%);
}
#welcome{
text-align:center;
opacity:0.9;
margin-top:150px;
}
#welcome img{
  width:300px;
  max-width:80%;
  border-radius:25px;
  box-shadow:0 0 40px rgba(255,0,150,0.7);
  animation:float 3s ease-in-out infinite;
}
@keyframes float{
  0%{transform:translateY(0);}
  50%{transform:translateY(-10px);}
  100%{transform:translateY(0);}
}
#iframePlayer, #floatingPlayer iframe{
  width:100%;
  height:100%;
  border:none;
}

/* MOBILE */
@media(max-width:768px){
  #menu{position:fixed;height:100%;z-index:999;}
  #mobileToggle{display:block;}
}

/* FAVORITE CHANNELS */

#favoriteChannels{
display:flex;
gap:15px;
justify-content:center;
margin-top:50px;
flex-wrap:wrap;
}

/* FLOAT PLAYER */

#floatingPlayer{
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
width:70%;
height:70%;
background:#000;
border-radius:12px;
box-shadow:0 0 50px rgba(0,0,0,0.9);
display:none;
z-index:9999;
overflow:hidden;
}

#floatingPlayer iframe{
width:100%;
height:100%;
border:none;
}

#closePlayer{
position:absolute;
top:8px;
right:12px;
font-size:22px;
color:#fff;
cursor:pointer;
z-index:10;
background:rgba(0,0,0,0.5);
padding:4px 10px;
border-radius:6px;
}

#closePlayer:hover{
background:red;
}
/* ปรับ fav-channel ให้โลโก้เต็มพื้นที่ */
.fav-channel{
  width: 80px;       
  height: 80px;
  border-radius: 12px;
  cursor: pointer;
  display: flex;
  justify-content: center;
  align-items: center;
  overflow: hidden;
  transition: transform 0.3s;
  padding: 0; /* ลบ padding เดิม */
  background: linear-gradient(90deg,#ff512f,#dd2476);
}

.fav-channel img{
  width: 100%;       /* ให้เต็มพื้นที่ container */
  height: 100%;      /* ให้เต็มพื้นที่ container */
  object-fit: cover; /* ครอบเต็มช่อง ไม่บิดรูป */
  display: block;
}

.fav-channel:hover{
  transform: scale(1.1);
}

.menu-section{
  margin:14px 0 8px;
  padding:6px 10px;

  font-size:12px;
  font-weight:600;
  letter-spacing:1px;

  color:#00e5ff;

  display:flex;
  align-items:center;
  gap:6px;

  position:relative;
}

/* เส้นเรืองแสง */
.menu-section::after{
  content:"";
  flex:1;
  height:1px;
  margin-left:8px;

  background:linear-gradient(
    to right,
    rgba(0,229,255,0.8),
    rgba(0,229,255,0.05)
  );
}

/* glow */
.menu-section span{
  text-shadow:0 0 8px rgba(0,229,255,0.7);
}
.menu-link{
  display:flex;
  justify-content:center;
  align-items:center;
  padding:8px;
  border-radius:10px;
}

.menu-link img{
  width:100%;
  max-width:120px;
  height:40px;
  object-fit:contain;
  filter:drop-shadow(0 0 6px rgba(255,255,255,0.3));
  transition:0.3s;
}

.menu-link:hover img{
  transform:scale(1.1);
}

</style>
</head>

<script>
const menuTitles=document.querySelectorAll(".menu-title");
const submenus=document.querySelectorAll(".submenu");
const links=document.querySelectorAll(".menu-link");
const iframe=document.getElementById("iframePlayer");
const welcome=document.getElementById("welcome");
const mobileToggle=document.getElementById("mobileToggle");
const sidebar=document.getElementById("menu");
const homeBtn=document.getElementById("homeBtn");

menuTitles.forEach(title=>{
  title.addEventListener("click",()=>{

    // ลบ active-title ทั้งหมดก่อน
    menuTitles.forEach(t=>t.classList.remove("active-title"));
    title.classList.add("active-title");

    const target=document.getElementById(title.dataset.menu);

    submenus.forEach(menu=>{
      if(menu!==target){menu.classList.remove("open");}
    });

    target.classList.toggle("open");
  });
});

links.forEach(link=>{
  link.addEventListener("click",()=>{

// 🔐 ตรวจสอบรหัสผ่าน
    const pass = link.dataset.pass;

    if(pass){
        const input = prompt("กรุณาใส่รหัสผ่าน");

        if(input !== pass){
            alert("รหัสไม่ถูกต้อง");
            return;
        }

    }
    
    links.forEach(l=>l.classList.remove("active"));
    link.classList.add("active");
    
    const url = link.dataset.url;
    const type = link.dataset.type || "iframe"; // ค่าเริ่มต้น

    // 🔥 เลือกการเปิดตามประเภท
    if(type === "iframe"){
        iframe.src = url;
        iframe.style.display="block";
        welcome.style.display="none";
    }
    else if(type === "page"){
        window.location.href = url;
    }
    else if(type === "blank"){
        window.open(url, "_blank");
    }

    if(window.innerWidth<768){
      sidebar.classList.add("hidden");
    }
  });
});

homeBtn.addEventListener("click",()=>{
  iframe.src="";
  iframe.style.display="none";
  welcome.style.display="block";

  links.forEach(l=>l.classList.remove("active"));
  menuTitles.forEach(t=>t.classList.remove("active-title"));
  submenus.forEach(menu=>menu.classList.remove("open")); // เพิ่มบรรทัดนี้
});

mobileToggle.addEventListener("click",()=>{
  sidebar.classList.toggle("hidden");
});



const favs=document.querySelectorAll(".fav-channel");
const floatPlayer=document.getElementById("floatingPlayer");
const floatFrame=document.getElementById("floatFrame");

favs.forEach(ch => {
  ch.addEventListener("click", () => {
    const url = ch.dataset.url;

    // เปิด float player
    floatFrame.src = url;  
    floatPlayer.style.display = "block";

    // รอ iframe โหลดแล้วปรับเสียง (สำหรับ player ที่รองรับ)
    floatFrame.onload = () => {
      try {
        const vid = floatFrame.contentWindow.document.querySelector("video");
        if (vid) vid.volume = 0.25; // ตั้งเสียง 25%
      } catch(e){
        // ถ้า cross-origin จะไม่สามารถเข้าถึงได้
        // embed-test.bananacake.org ใช้ ?muted=0
      }
    };
  });
});
document.getElementById("closePlayer").onclick=()=>{

floatPlayer.style.display="none";
floatFrame.src="";

};

</script>
