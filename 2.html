<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <title>Live Score</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
</head>

<body class="bg-gradient-to-br from-gray-900 via-slate-800 to-gray-900 text-white p-4">

<!-- 🔥 glow background -->
<div class="fixed inset-0 -z-10
  bg-[radial-gradient(circle_at_20%_20%,#3b82f633,transparent),
      radial-gradient(circle_at_80%_80%,#06b6d433,transparent)]">
</div>

<h1 class="text-2xl mb-4 font-bold tracking-wide">⚽ ตารางแข่งขัน</h1>

<div id="leagueBar" class="flex gap-4 overflow-x-auto pb-2 mb-4"></div>
<div id="matches" class="grid md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4"></div>

<style>
.active-server {
  box-shadow: 0 0 12px #3b82f6, 0 0 20px #06b6d4;
  transform: scale(1.08);
}
</style>

<script>
let selectedLeague = null;
let leaguesMap = {};
let PLAYLIST = [];

/* ===== เดิมทั้งหมด ===== */
async function loadPlaylist() {
  const res = await fetch("https://raw.githubusercontent.com/nongakka/shortmovie/main/playlist.json");
  PLAYLIST = await res.json();
}

function normalize(str) {
  return (str || "").toLowerCase().replace(/[^a-z0-9]/g, "");
}

function findStream(channelName) {
  if (!channelName || PLAYLIST.length === 0) return null;
  const cleanChannel = normalize(channelName);
  return PLAYLIST.find(p => {
    const cleanTitle = normalize(p.title);
    return cleanTitle.includes(cleanChannel) || cleanChannel.includes(cleanTitle);
  });
}

/* ===== ลีก (เพิ่ม hover) ===== */
async function loadLeagues() {
  const res = await fetch("https://corsproxy.io/?https://liveplayback.net/api/leagues");
  const data = await res.json();

  const bar = document.getElementById("leagueBar");
  bar.innerHTML = "";

  data.data.forEach(l => leaguesMap[l.league_id] = l);
  data.data.sort((a,b) => a.league_order - b.league_order);

  bar.innerHTML += `
    <div onclick="selectLeague(null)"
      class="shrink-0 w-20 flex flex-col items-center cursor-pointer group">
      <div class="w-16 h-16 rounded-xl bg-blue-600 flex items-center justify-center shadow-md group-hover:scale-105 transition">
        🌍
      </div>
      <span class="mt-2 text-xs text-gray-200">ทั้งหมด</span>
    </div>
  `;

  data.data.forEach(l => {
    bar.innerHTML += `
      <div onclick="selectLeague(${l.league_id})"
        class="shrink-0 w-20 flex flex-col items-center cursor-pointer group">

        <div class="w-16 h-16 rounded-xl bg-white/20 backdrop-blur flex items-center justify-center
          group-hover:bg-blue-500/30 transition">
          <img src="${l.logo}" class="w-10 h-10 object-contain">
        </div>

        <span class="mt-2 text-xs text-center text-gray-200">${l.name}</span>
      </div>
    `;
  });
}

function selectLeague(id) {
  selectedLeague = id;
  loadMatches();
}

function formatThaiTime(dateStr) {
  if (!dateStr) return "-";
  const iso = dateStr.replace(" ", "T").replace("+07", "+07:00");
  const d = new Date(iso);
  if (isNaN(d)) return "-";

  return d.toLocaleTimeString("th-TH", {
    hour: "2-digit",
    minute: "2-digit",
    timeZone: "Asia/Bangkok"
  });
}

/* ===== การ์ด (UI upgrade แต่ข้อมูลเดิมครบ) ===== */
async function loadMatches() {
  const res = await fetch("https://corsproxy.io/?https://liveplayback.net/api/fixtures/date");
  const data = await res.json();

  const container = document.getElementById("matches");
  container.innerHTML = "";

  for (const date in data) {

    let matches = data[date];
    if (selectedLeague) matches = matches.filter(m => m.league === selectedLeague);
    if (matches.length === 0) continue;

    container.innerHTML += `
      <h2 class="col-span-full text-lg mt-4 mb-2 text-yellow-400 font-semibold">
        📅 ${date}
      </h2>
    `;

    matches.sort((a,b) => new Date(a.event_time) - new Date(b.event_time));

    matches.forEach(m => {

      const stream = findStream(m.channel);
      const streamUrl = stream?.servers?.[0]?.url || "#";
      const streamLogo = stream?.logo || "";

      const league = leaguesMap[m.league] || m.league_info;

      let bg = "bg-white/10 backdrop-blur-md border border-white/10 hover:scale-[1.02] hover:shadow-xl transition";

      if (m.status_short === "1H" || m.status_short === "2H") {
        bg = "bg-pink-500/20 border border-pink-400 shadow-lg shadow-pink-500/30 animate-pulse";
      }

      container.innerHTML += `
      <div class="${bg} rounded-xl p-4 flex flex-col h-full">

        <!-- ลีก -->
        <div class="flex justify-between mb-2 text-sm text-gray-200">
          <div class="flex items-center gap-2">
            <img src="${league?.logo}" class="w-5 h-5">
            <span class="font-semibold">${league?.name}</span>
          </div>
          <span>${formatThaiTime(m.event_time)}</span>
        </div>

        <!-- ทีม -->
        <div class="flex items-center justify-between">

          <div class="flex items-center gap-2 flex-1">
            <img src="${m.teamhome?.logo}" class="w-6 h-6">
            <span class="text-sm text-white/90">${m.teamhome?.name}</span>
          </div>

          <div class="px-2">
            <span class="text-lg font-bold text-green-400">
              ${m.goals_home ?? "?"} - ${m.goals_away ?? "?"}
            </span>
          </div>

          <div class="flex items-center gap-2 flex-1 justify-end">
            <span class="text-sm text-white/90">${m.teamaway?.name}</span>
            <img src="${m.teamaway?.logo}" class="w-6 h-6">
          </div>

        </div>

        <!-- ช่อง -->
        <div class="mt-auto pt-3 border-t border-white/10 flex justify-between items-center">

          <div class="flex items-center gap-2">
            ${streamLogo
              ? `<img src="${streamLogo}" class="w-5 h-5 rounded">`
              : `<div class="w-5 h-5 bg-white/10 rounded flex items-center justify-center">📺</div>`
            }
            <span class="text-xs text-gray-200">${m.channel || "-"}</span>
          </div>

          ${
            streamUrl !== "#"
            ? `<button onclick='openPlayer("${streamUrl}", ${JSON.stringify(stream?.servers || [])})'
                class="text-xs px-3 py-1.5 rounded-lg
                bg-gradient-to-r from-blue-500 to-cyan-400
                hover:scale-105 transition shadow-md">
                ▶ ดูสด
              </button>`
            : `<span class="text-xs text-gray-500">ไม่มีลิ้ง</span>`
          }

        </div>

      </div>
      `;
    });
  }
}

/* ===== init ===== */
(async () => {
  await loadPlaylist();
  loadLeagues();
  loadMatches();
  setInterval(loadMatches, 30000);
})();

/* ===== player ===== */
let hls;

function openPlayer(url, servers = []) {
  const modal = document.getElementById("playerModal");
  const list = document.getElementById("serverList");

  playStream(url);

  list.innerHTML = "";
  servers.forEach((s, i) => {
    list.innerHTML += `
      <button onclick="switchServer('${s.url}', this)"
        class="server-btn px-3 py-1 rounded text-xs
        ${i === 0 ? 'bg-blue-600 active-server' : 'bg-white/10 hover:bg-blue-600'}">
        ${s.name || 'Server ' + (i+1)}
      </button>
    `;
  });

  modal.classList.remove("hidden");
  modal.classList.add("flex");
}

function playStream(url) {
  const video = document.getElementById("videoPlayer");
  if (hls) hls.destroy();

  if (Hls.isSupported()) {
    hls = new Hls();
    hls.loadSource(url);
    hls.attachMedia(video);
    hls.on(Hls.Events.MANIFEST_PARSED, () => video.play());
  } else {
    video.src = url;
    video.play();
  }
}

function switchServer(url, el) {
  playStream(url);

  document.querySelectorAll(".server-btn").forEach(btn => {
    btn.classList.remove("bg-blue-600","active-server");
    btn.classList.add("bg-white/10");
  });

  el.classList.remove("bg-white/10");
  el.classList.add("bg-blue-600","active-server");
}

function closePlayer() {
  document.getElementById("playerModal").classList.add("hidden");
}

document.addEventListener("keydown", e => {
  if (e.key === "Escape") closePlayer();
});
</script>

<!-- PLAYER -->
<div id="playerModal"
  onclick="closePlayer()"
  class="fixed inset-0 bg-black/90 hidden items-center justify-center z-50">

  <div onclick="event.stopPropagation()" class="w-full max-w-5xl">

    <video id="videoPlayer" class="w-full rounded-xl" controls autoplay></video>

    <div id="serverList" class="mt-3 flex gap-2 justify-center"></div>

  </div>
</div>

</body>
</html>
