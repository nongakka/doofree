<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TV Live1</title>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<style>
body{
  margin:0;
  font-family:sans-serif;
  background:#0f0c29;
  color:#fff;
}

#channels{
  display:flex;
  flex-wrap:wrap;
  gap:15px;
  padding:20px;
  justify-content:center;
}

.channel{
  width:100px;
  height:100px;
  background:#222;
  border-radius:12px;
  display:flex;
  justify-content:center;
  align-items:center;
  cursor:pointer;
  transition:0.3s;
  overflow:hidden;
}

.channel:hover{
  transform:scale(1.1);
}

.channel img{
  width:100%;
  height:100%;
  object-fit:cover;
}

#playerBox{
  position:fixed;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  width:80%;
  height:70%;
  background:#000;
  display:none;
  border-radius:12px;
  overflow:hidden;
}

video{
  width:100%;
  height:100%;
}

#close{
  position:absolute;
  top:10px;
  right:15px;
  font-size:20px;
  cursor:pointer;
  z-index:10;
}
</style>
</head>

<body>

<h2 style="text-align:center;margin-top:10px;">📺 TV Live</h2>

<div id="channels"></div>

<div id="playerBox">
  <div id="close">✕</div>
  <video id="video" controls autoplay></video>
</div>

<script>

// 🔥 proxy (ถ้ามี)
const proxy = "https://summer-recipe-da50.hssmnoy.workers.dev/?url=";

// 🔥 API list ช่อง (ต้องหา endpoint ที่คุณใช้)
const listAPI = proxy + encodeURIComponent("https://web-sila.ais-vidnt.com/get_channels/?d=gstweb"); // 👈 ใส่ของคุณ

const channelsDiv = document.getElementById("channels");
const video = document.getElementById("video");
const playerBox = document.getElementById("playerBox");

// โหลดรายการช่อง
async function loadChannels(){
  try{
    const res = await fetch(listAPI);
    const data = await res.json();

    const items = data.items;

items.forEach(ch => {

  const div = document.createElement("div");
  div.className = "channel";

if(!ch.mid) return;
div.dataset.id = ch.mid;

  div.innerHTML = `<img src="${ch.poster}" alt="${ch.title}">`;

  div.onclick = () => playChannel(div.dataset.id);

  channelsDiv.appendChild(div);
});

  }catch(e){
    console.error(e);
  }
}

// เล่นช่อง
let hls;

async function playChannel(id){

  try{

    const api = `${proxy}https://redirector.ais-vidnt.com/live/ais/${id}/hls/metadata.json?https_streaming=true`;
console.log("M3U8:", m3u8);
    const res = await fetch(api);
    const data = await res.json();

    // ✅ ใช้ playbackUrls เท่านั้น
    let m3u8 = data.playbackUrls?.[0]?.url;

    if(!m3u8){
      alert("ไม่มีลิ้งเล่น");
      console.log(data);
      return;
    }

    playerBox.style.display = "block";

    if(hls){
      hls.destroy();
    }

    const stream = proxy + encodeURIComponent(m3u8);

    if(Hls.isSupported()){
      hls = new Hls();

      hls.loadSource(stream);
      hls.attachMedia(video);

      video.muted = true;
      video.play();

    }else{
      video.src = stream;
      video.play();
    }

  }catch(err){
    alert("เล่นไม่ได้");
    console.error(err);
  }
}

// ปิด player
document.getElementById("close").onclick = () => {
  playerBox.style.display = "none";
  video.pause();
  video.src = "";
};

// เริ่มโหลดช่อง
loadChannels();

</script>

</body>
</html>
