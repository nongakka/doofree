<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>Dooball Player</title>

<style>
body {
  margin:0;
  background:#000;
  color:#fff;
  font-family: sans-serif;
}

#player {
  width:100%;
  height:60vh;
  background:#111;
  display:flex;
  align-items:center;
  justify-content:center;
}

iframe {
  width:100%;
  height:100%;
  border:none;
}

#channels {
  padding:10px;
  display:flex;
  gap:10px;
  flex-wrap:wrap;
}

button {
  padding:10px 15px;
  border:none;
  border-radius:8px;
  background:#222;
  color:#fff;
  cursor:pointer;
}

button:hover {
  background:#444;
}
</style>

</head>
<body>

<div id="player">
  <div>เลือกช่องเพื่อเริ่ม</div>
</div>

<div id="channels">
  <button onclick="play('th-monomax01')">MonoMax</button>
  <button onclick="play('th-mono29')">Mono29</button>
</div>

<script>
async function play(channel) {
  const playerDiv = document.getElementById("player");

  // loading
  playerDiv.innerHTML = "<div>⏳ กำลังโหลด...</div>";

  try {
    // 🔥 เรียก ajax_player (เหมือนเว็บต้นฉบับ)
    const res = await fetch(
      `https://embed.bananacake.org/dooball66v2/ajax_player.php?channel=${channel}&api_key=hmcb4rf66f`
    );

    const html = await res.text();

    // 🔥 ดึง iframe src (player_basic + token)
    const match = html.match(/src="([^"]*player_basic[^"]*)"/);

    if (match && match[1]) {
      const iframeSrc = match[1];

      // 🔥 ใส่ iframe ลงหน้าเว็บเรา
      playerDiv.innerHTML = `
        <iframe 
          src="${iframeSrc}"
          allow="autoplay; fullscreen"
          allowfullscreen>
        </iframe>
      `;

    } else {
      playerDiv.innerHTML = "❌ หา player ไม่เจอ";
    }

  } catch (err) {
    console.error(err);
    playerDiv.innerHTML = "❌ โหลดไม่ได้ (อาจติด CORS)";
  }
}
</script>

</body>
</html>
