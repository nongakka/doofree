        body {
            margin: 0;
            padding: 0;
            background-color: #000;
            color: #fff;
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        #player-container {
    width: 60%;
    max-width: 1200px;
    margin: 10px auto;
    position: relative;
    aspect-ratio: 16 / 9;
    background: black;
}

#jw-player,
#html5-player {
    width: 100% !important;
    height: 100% !important;
    position: absolute;
    top: 0;
    left: 0;
}

        #channel-list {
            margin: 10px auto;
            max-width: 1200px;
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 10px;
            overflow-x: auto;
            padding: 10px;
        }

        .channel {
            cursor: pointer;
            padding: 5px 3px;
            background: #222;
            border: 2px solid #444;
            border-radius: 8px;
            text-align: center;
            font-size: 12px;
            transition: all 0.2s;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            min-height: 80px;
        }

        .channel img {
            width: 65px;
            height: 65px;
            margin-bottom: 5px;
            object-fit: contain;
        }

        .channel:hover {
            background: #000;
            border-color: orange;
        }

        .channel.active {
            background: orange;
            color: black;
            border-color: yellow;
        }

        #channel-list::-webkit-scrollbar {
            height: 8px;
        }
        #channel-list::-webkit-scrollbar-thumb {
            background: orange;
            border-radius: 4px;
        }
        #channel-list::-webkit-scrollbar-track {
            background: #111;
        }

        @media(max-width: 768px){
            #channel-list {
                grid-template-columns: repeat(5, 1fr);
            }
            .channel {
                min-height: 70px;
            }
        }

        @media(max-width: 480px){
            #channel-list {
                grid-template-columns: repeat(3, 1fr);
            }
            .channel img {
                width: 52px;
                height: 52px;
            }
            .channel {
                font-size: 10px;
                min-height: 60px;
            }
        }

    // โหลดช่อง + ตั้งค่า player
    let currentHls = null;

function loadChannel(channel, element) {

    document.querySelectorAll('.channel')
        .forEach(ch => ch.classList.remove('active'));
    if (element) element.classList.add('active');

    const jwContainer = document.getElementById("jw-player");
    const html5Video = document.getElementById("html5-player");

    // รีเซ็ตของเก่า
    if (currentHls) {
        currentHls.destroy();
        currentHls = null;
    }

    try {
        jwplayer("jw-player").remove();
    } catch (e) {}

    html5Video.pause();
    html5Video.src = "";
    html5Video.style.display = "none";
    jwContainer.style.display = "block";

    // ---------------------------
    // ✅ ให้ JW ลองเล่นก่อนเสมอ
    // ---------------------------
    const jwConfig = {
        file: channel.file,
        width: "100%",
        aspectratio: "16:9",
        autostart: true,
        mute: true
    };

    // ถ้ามี DRM ใส่เพิ่ม
    if (channel.drm) {
        jwConfig.drm = {
            clearkey: {
                keyId: channel.keyId,
                key: channel.key
            }
        };
    }

    const playerInstance = jwplayer("jw-player").setup(jwConfig);

    let fallbackUsed = false;

    // ---------------------------
    // ❌ ถ้า JW error → สลับ HTML5
    // ---------------------------
    playerInstance.on("error", function () {
        if (!fallbackUsed) {
            fallbackUsed = true;
            console.log("JW Error → Switch to HTML5");
            useHTML5(channel.file);
        }
    });

    // ---------------------------
    // ⏳ ถ้าโหลดไม่ขึ้นใน 8 วิ → สลับ
    // ---------------------------
    setTimeout(() => {
   const state = playerInstance.getState();

   if (state !== "playing" && state !== "buffering" && !fallbackUsed) {
       fallbackUsed = true;   // ❗ เพิ่มบรรทัดนี้
       useHTML5(channel.file);
   }

}, 12000);
}

    // โหลดช่องแรกทันที
    document.addEventListener("DOMContentLoaded", function () {

    const listContainer = document.getElementById("channel-list");
    let firstChannel = null;
    let firstElement = null;

    channels.forEach((ch, index) => {

        const div = document.createElement("div");
        div.className = "channel";
        div.innerHTML = `<img src="${ch.logo}"><span>${ch.name}</span>`;
        div.onclick = () => loadChannel(ch, div);

        if (index === 0) {
            firstChannel = ch;
            firstElement = div;
        }

        listContainer.appendChild(div);
    });

    // โหลดช่องแรกอัตโนมัติ
    if (firstChannel && firstElement) {
        firstElement.classList.add("active");
        loadChannel(firstChannel, firstElement);
    }

});
function useHTML5(url) {

    const jwContainer = document.getElementById("jw-player");
    const html5Video = document.getElementById("html5-player");

    jwContainer.style.display = "none";
    html5Video.style.display = "block";

    if (html5Video.canPlayType('application/vnd.apple.mpegurl')) {
        html5Video.src = url;
        html5Video.play();
    } 
    else if (Hls.isSupported()) {

        currentHls = new Hls();
        currentHls.loadSource(url);
        currentHls.attachMedia(html5Video);

        currentHls.on(Hls.Events.MANIFEST_PARSED, function () {
            html5Video.play();
        });
    }
}
